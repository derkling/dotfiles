# use vim mode
setw -g mode-keys vi

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind a send-prefix

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf

# quick pane cycling with Ctrl-a
unbind ^A
bind ^A select-pane -t :.+

# mode around like in vim
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind h select-pane -L

# resize panes in step of 5
bind ^Down  resize-pane -D 5
bind ^Up    resize-pane -U 5
bind ^Right resize-pane -R 5
bind ^Left  resize-pane -L 5

# Disable window renaming
set-option -g allow-rename off

# Mouse mode (on by default)
set-option -g -q mouse on

# # Toggle mouse mode on and off
# bind M set-option -g -q mouse on
#     display 'Mouse: ON'
# bind m set-option -g -q mouse off \
#     display 'Mouse: OFF'

# Move between split planes using vi-style keys
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R

# Longer scrollback history
set -g history-limit 50000

# Scroll and copy using vi-style keys
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Enable passthrough since we never have a local X server
set -s set-clipboard on

# Enable mouse and copy-and-paste, https://stackoverflow.com/a/46108732
set -g mouse on
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboar"

# Windows style
# Allow do have different styles for active and non-active panes.
# Using Horizon Dark colors: active matches the main terminal bg,
# inactive is slightly darker/lighter.
set-window-option -g window-style 'bg=#232530'
set-window-option -g window-active-style 'bg=#1C1E26'
set-window-option -g pane-active-border-style 'fg=#EE64AC'
set-window-option -g pane-border-style 'fg=#232530'

# Zoom mode
unbind +
bind + \
    new-window -d -n tmux-zoom 'clear && echo TMUX ZOOM && read' \;\
    swap-pane -s tmux-zoom.0 \;\
    select-window -t tmux-zoom
unbind -
bind - \
    last-window \;\


# Assume terminal has 256-color and true-color capabilities
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,alacritty:RGB"
set -g default-shell /bin/bash

# move x clipboard into tmux paste buffer
bind C-p run "xclip -o | tmux load-buffer - ; tmux paste-buffer"
# move tmux copy buffer into x clipboard
bind C-y run "tmux show-buffer | xclip -i -selection clipboard,primary"

# Custom styling (Horizon Dark theme)
set -g status-position bottom
set -g status-style 'fg=#D5D8DA,bg=#232530,dim'
set -g status-left ''
set -g status-right '#[fg=#1C1E26,bg=#FAC29A,bold] %d/%m #[fg=#1C1E26,bg=#26BBD9,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=#1C1E26,bg=#EE64AC,bold'
setw -g window-status-current-format ' #I:#W '

setw -g window-status-style 'fg=#D5D8DA,bg=#232530'
setw -g window-status-format ' #I:#W '

setw -g window-status-bell-style 'fg=#1C1E26,bg=#E95678,bold'
